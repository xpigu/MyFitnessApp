name: Android Release APK

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate required secrets
        env:
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          test -n "${AMAP_API_KEY}" || (echo "Missing secret: AMAP_API_KEY" && exit 1)
          test -n "${ANDROID_KEYSTORE_BASE64}" || (echo "Missing secret: ANDROID_KEYSTORE_BASE64" && exit 1)
          test -n "${ANDROID_KEYSTORE_PASSWORD}" || (echo "Missing secret: ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "${ANDROID_KEY_ALIAS}" || (echo "Missing secret: ANDROID_KEY_ALIAS" && exit 1)
          test -n "${ANDROID_KEY_PASSWORD}" || (echo "Missing secret: ANDROID_KEY_PASSWORD" && exit 1)

      - name: Build unsigned release APK
        env:
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleRelease -PAMAP_API_KEY="${AMAP_API_KEY}"

      - name: Sign release APK
        id: sign_app
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Prepare release asset
        id: prepare_asset
        run: |
          APK_NAME="dongxinlian-${GITHUB_REF_NAME}.apk"
          cp "${{ steps.sign_app.outputs.signedReleaseFile }}" "${APK_NAME}"
          echo "apk_name=${APK_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Upload signed APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk-${{ github.ref_name }}
          path: ${{ steps.prepare_asset.outputs.apk_name }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 动心练 ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.prepare_asset.outputs.apk_name }}
          overwrite_files: true
